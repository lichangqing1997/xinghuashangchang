<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World 2 - 兴华商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #6a11cb, #8e44ad, #c084fc);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            padding: 60px 80px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1 {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 16px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.8;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: rgba(255, 255, 255, 0.6);
            margin: 20px auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World 2</h1>
        <div class="divider"></div>
        <p>欢迎来到兴华商城</p>
        <p>品质生活，从这里开始</p>
    </div>
</body>
</html>
